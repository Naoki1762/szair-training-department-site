services:
  mysql:
    image: mysql:8.0
    container_name: szair-training-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-szair_training_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-szair_training}
      MYSQL_USER: ${MYSQL_USER:-szair_training}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-szair_training_dev_2026}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-szair_training_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
